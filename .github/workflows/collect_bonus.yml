name: Collect RBR Timed Bonus

on:
  schedule:
    - cron: '*/30 * * * *'   # Runs every 30 minutes
  workflow_dispatch:          

jobs:
  collect-bonus:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install rbrapi

      - name: Collect timed bonus
        env:
          RBR_EMAIL: ${{ secrets.RBR_EMAIL }}
          RBR_PASSWORD: ${{ secrets.RBR_PASSWORD }}
        run: python collect_bonus.py
